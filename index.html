<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>THURSDAY IDE | MASTER ARCHITECT</title>
    <style>
        :root { --glow: #00ffcc; --bg: #050505; --surface: #0a0a0a; }
        body { background: var(--bg); color: #e0e0e0; font-family: 'Fira Code', monospace; margin: 0; display: grid; grid-template-rows: 45px 1fr 200px; height: 100vh; overflow: hidden; }
        header { background: #111; border-bottom: 1px solid var(--glow); display: flex; align-items: center; padding: 0 20px; gap: 25px; font-size: 11px; }
        .main { display: grid; grid-template-columns: 280px 1fr 350px; overflow: hidden; }
        .panel { background: var(--surface); border: 1px solid #1a1a1a; display: flex; flex-direction: column; }
        textarea { flex: 1; background: #000; color: #fff; border: none; padding: 25px; font-size: 14px; outline: none; resize: none; line-height: 1.5; }
        #terminal { background: #000; border-top: 1px solid var(--glow); padding: 15px; overflow-y: auto; color: #00ffcc; font-size: 12px; white-space: pre-wrap; }
        .status-pill { background: rgba(0, 255, 204, 0.1); color: var(--glow); padding: 2px 10px; border-radius: 10px; border: 1px solid var(--glow); }
        .btn { background: var(--glow); color: #000; border: none; padding: 8px 15px; cursor: pointer; font-weight: bold; text-transform: uppercase; font-size: 10px; }
    </style>
</head>
<body>
    <header>
        <span style="font-weight: 900; letter-spacing: 2px;">THURSDAY v3.0 [SOVEREIGN]</span>
        <span class="status-pill">128x H100 CLUSTER: ACTIVE</span>
        <span class="status-pill">VOID STORAGE: 100TB MOUNTED</span>
        <button class="btn" style="margin-left: auto;" onclick="ignite()">IGNITE 2T TRAINING</button>
    </header>
    <div class="main">
        <div class="panel" style="padding: 15px;">
            <h4 style="margin: 0; color: var(--glow);">VOID EXPLORER</h4>
            <div id="files" style="font-size: 12px; margin-top: 15px; color: #666;">
                📁 datasets/shards_100TB<br>📁 weights/2T_MoE_layers<br>📄 hyperparams.yaml
            </div>
            <button class="btn" style="margin-top: auto;" onclick="upload()">SYNC LOCAL TO VOID</button>
        </div>
        <div class="panel"><textarea id="editor" placeholder="# Define 2-Trillion Parameter MoE Architecture..."></textarea></div>
        <div class="panel" style="background: #080808; padding: 15px;">
            <h4 style="color: var(--glow);">CLAUDE OPUS 4.6 ENGINE</h4>
            <div id="chat" style="flex:1; overflow-y:auto; font-size: 13px;">> Ready for Master's decree.</div>
            <input type="text" id="prompt" placeholder="Ask Architect..." style="background:#000; border:1px solid #333; color:#fff; padding:10px;">
        </div>
    </div>
    <div id="terminal">> INITIALIZING GHOST-IP-42.64.2048.128...<br>> SYNCING WITH SHOPKEEPER FORGE...</div>

    <script>
        function ignite() {
            const term = document.getElementById('terminal');
            term.innerHTML += `\n> [IGNITION]: Pushing 2T Tensors to 128x H100 Swarm...\n> [COMPUTE]: Peak TFLOPS 4.2 | Loss: 9.876...`;
        }
        function upload() { alert("Bridge Active: Mirroring local 100TB to Void Storage."); }
    </script>
</body>
</html>
